name: Limbus Company 新着通知

on:
  schedule:
    - cron: '*/10 * * * *'  # 10分おきに実行
  workflow_dispatch:         # 手動実行ボタンも有効化

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # last_id.txt を書き戻すために必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存ライブラリ インストール
        run: pip install requests feedparser

      - name: フィードチェック & Discord通知
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python check_feed.py

      - name: last_id.txt をコミット
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_id.txt
          git diff --cached --quiet || git commit -m "Update last_id"
          git push
